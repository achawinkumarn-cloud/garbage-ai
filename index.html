<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI แยกขยะ</title>

<!-- โหลด lib -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

</head>

<body>

<h1>🤖 AI แยกขยะ</h1>
<button onclick="start()">📷 เปิดกล้อง</button>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/3EFdknX8t/";

let model, webcam, labelContainer, maxPredictions;

async function start() {

    // 🔥 เช็คก่อนว่าโหลด lib มาไหม
    if (typeof tmImage === "undefined") {
        alert("❌ โหลด AI ไม่สำเร็จ (tmImage ไม่มี)");
        return;
    }

    try {
        await init();
    } catch (e) {
        alert("❌ เปิดกล้องไม่ได้: " + e.message);
        console.log(e);
    }
}

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    // โหลดโมเดล
    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    // 🔥 สร้าง webcam ก่อนใช้
    webcam = new tmImage.Webcam(250, 250, true);

    if (!webcam) {
        alert("❌ สร้างกล้องไม่สำเร็จ");
        return;
    }

    // 🔥 มือถือใช้ environment
    await webcam.setup({ facingMode: "environment" });

    await webcam.play();

    window.requestAnimationFrame(loop);

    // แสดงกล้อง
    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    container.appendChild(webcam.canvas);

    // label
    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";

    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {

    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.childNodes[i].innerHTML =
            prediction[i].className + " : " +
            prediction[i].probability.toFixed(2);
    }
}

</script>

</body>
</html>
