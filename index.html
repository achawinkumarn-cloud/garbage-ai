<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Garbage AI</title>
</head>
<body>

  <h2>AI แยกขยะ</h2>
  <button onclick="init()">เปิดกล้อง</button>

  <br><br>

  <!-- กล้อง -->
  <video id="video" width="300" height="300" autoplay playsinline></video>

  <!-- canvas ซ่อนไว้ -->
  <canvas id="canvas" width="300" height="300" style="display:none;"></canvas>

  <!-- แสดงผล -->
  <div id="label-container"></div>

  <!-- โหลด Teachable Machine -->
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/3EFdknX8t/"; 
    // 🔴 ใส่ลิงก์โมเดลของคุณตรงนี้

    let model, maxPredictions;
    let video, canvas, ctx, labelContainer;

    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      // โหลดโมเดล
      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      video = document.getElementById("video");
      canvas = document.getElementById("canvas");
      ctx = canvas.getContext("2d");

      // 🔥 เปิดกล้อง (ใช้ได้ทุกเครื่อง รวม iPhone)
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";

      for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
      }

      loop();
    }

    async function loop() {
      ctx.drawImage(video, 0, 0, 300, 300);
      await predict();
      requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(canvas);

      for (let i = 0; i < maxPredictions; i++) {
        labelContainer.childNodes[i].innerHTML =
          prediction[i].className + ": " +
          prediction[i].probability.toFixed(2);
      }
    }
  </script>

</body>
</html>
