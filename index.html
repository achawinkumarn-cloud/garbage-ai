<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>AI แยกขยะ</title>
</head>
<body>

<h1>🤖 AI แยกขยะ</h1>
<button onclick="start()">📷 เปิดกล้อง</button>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/d65jgZU5K/";

let model, webcam, labelContainer, maxPredictions;

// 🔥 โหลด script ก่อน
function loadScript(src) {
    return new Promise(resolve => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        document.body.appendChild(script);
    });
}

async function start() {
    try {
        // โหลด AI ก่อน
        if (typeof tmImage === "undefined") {
            await loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest");
            await loadScript("https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest");
        }

        init();

    } catch (e) {
        alert("โหลด AI ไม่สำเร็จ: " + e.message);
    }
}

async function init() {
    try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(200, 200, true);

        await webcam.setup();
        await webcam.play();

        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

    } catch (error) {
        alert("❌ เปิดกล้องไม่ได้: " + error.message);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.childNodes[i].innerHTML =
            prediction[i].className + ": " +
            prediction[i].probability.toFixed(2);
    }
}
</script>

</body>
</html>
